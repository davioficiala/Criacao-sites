<h2>O que é React?</h2>

<p>
React é uma biblioteca JavaScript usada para criar interfaces modernas.
Ele trabalha com componentes, que são módulos reutilizáveis do sistema.
</p>

<h2>Módulos do React</h2>

<ul>
<li>Componentes</li>
<li>Hooks</li>
<li>Estado (State)</li>
<li>Props</li>
<li>Rotas</li>
<li>Integração com APIs e Firebase</li>
</ul>
